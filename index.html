<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Simulador Copa do Mundo 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  html, body { margin:0; padding:0; background:#0a0e1a; color:#e2e8f0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; }
  #root { min-height:100vh; }
  .boot { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:12px; font-size:14px; color:#94a3b8; }
  .boot .spinner { width:32px; height:32px; border:3px solid #1e293b; border-top-color:#fbbf24; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { font-family:monospace; padding:20px; color:#fca5a5; font-size:12px; white-space:pre-wrap; word-break:break-all; }
</style>
</head>
<body>
<div id="root"><div class="boot"><div class="spinner"></div><div>Carregando simulador...</div></div></div>

<script>
// Catch any error and surface it to the page
window.addEventListener('error', function(e) {
  var r = document.getElementById('root');
  if (r) r.innerHTML = '<div class="err">ERRO: ' + (e.message || 'desconhecido') + '\nLinha: ' + (e.lineno || '?') + '\n\n' + (e.error && e.error.stack ? e.error.stack : '') + '</div>';
});
</script>
